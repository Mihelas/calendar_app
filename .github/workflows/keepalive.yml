name: keep-alive

# Pings the Streamlit Cloud app on a schedule so it doesn't get put to sleep
# after a few hours of inactivity. Hits the lightweight `/_stcore/health`
# endpoint, which returns 'ok' without rendering the full Streamlit page.
#
# To change the target URL or the interval, edit `APP_URL` and the cron
# expression below.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC)
  workflow_dispatch:          # also allows running manually from the Actions tab

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      APP_URL: "https://calendarapp-hef8qyexgkqnwhcp2dstqb.streamlit.app"
    steps:
      - name: Ping app health endpoint
        run: |
          set -euo pipefail
          # Do NOT follow redirects: when the app is asleep, Streamlit
          # serves a redirect to its "wake this app" page that loops on
          # itself, exhausting curl's redirect limit. We don't need to
          # reach a final 200 -- we just need our HTTP request to land on
          # Streamlit's servers, which is enough to keep the app warm
          # (and to wake it on the next user visit).
          STATUS=$(curl --silent --show-error --max-time 60 \
            --output /dev/null --write-out '%{http_code}' \
            "${APP_URL}/_stcore/health")
          echo "HTTP ${STATUS} from ${APP_URL}/_stcore/health"
          # Treat any 2xx (app awake) or 3xx (app asleep, redirected to
          # wake page) as a successful ping. Anything else is unexpected.
          case "${STATUS}" in
            2??|3??) echo "OK"; exit 0 ;;
            *) echo "Unexpected status code"; exit 1 ;;
          esac
