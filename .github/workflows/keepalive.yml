name: keep-alive

# Pings the Streamlit Cloud app on a schedule so it doesn't get put to sleep
# after a few hours of inactivity. Hits the lightweight `/_stcore/health`
# endpoint, which returns 'ok' without rendering the full Streamlit page.
#
# To change the target URL or the interval, edit `APP_URL` and the cron
# expression below.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC)
  workflow_dispatch:          # also allows running manually from the Actions tab

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      APP_URL: "https://calendarapp-hef8qyexgkqnwhcp2dstqb.streamlit.app"
    steps:
      - name: Ping app health endpoint
        run: |
          set -euo pipefail
          STATUS=$(curl --silent --show-error --location --max-time 60 \
            --output /dev/null --write-out '%{http_code}' \
            "${APP_URL}/_stcore/health")
          echo "HTTP ${STATUS} from ${APP_URL}/_stcore/health"
          if [ "${STATUS}" != "200" ]; then
            echo "Unexpected status code"
            exit 1
          fi
